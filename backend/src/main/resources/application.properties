spring.application.name=apuntar
management.endpoints.web.exposure.include=health,info,env,metrics
management.endpoint.health.show-details=always

#postgres
spring.datasource.url=jdbc:postgresql://localhost:5433/apuntar-pg
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

#mongo
spring.mongodb.uri=mongodb://root:rootroot@localhost:27017/apuntar-mongo?authSource=admin
